name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-lint-test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    
    # Optional: configure concurrency to cancel in-progress runs on same PR
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Types
        run: pnpm exec prisma generate --schema prisma/schema.prisma

      - name: Check Formatting & Linting
        run: pnpm lint

      - name: Run Tests
        # This uses Turborepo to run `test` in all packages concurrently
        run: pnpm test

      - name: Build applications
        # This uses Turborepo to run `build` in all packages with caching
        run: pnpm build
