services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hms_password}
      POSTGRES_DB: ${POSTGRES_DB:-hms_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hms_user} -d ${POSTGRES_DB:-hms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hms_network

  # ─── Backend (NestJS) ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
      target: development
    container_name: hms_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-hms_user}:${POSTGRES_PASSWORD:-hms_password}@postgres:5432/${POSTGRES_DB:-hms_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ./apps/backend:/app/apps/backend
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hms_network

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend.Dockerfile
      target: development
    container_name: hms_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - backend
    networks:
      - hms_network

volumes:
  postgres_data:

networks:
  hms_network:
    driver: bridge
